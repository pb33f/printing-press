name: Tag Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release bump from merged PR
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const commitSha = context.sha;
            const baseBranch = context.ref.replace('refs/heads/', '');
            const attempts = 12;
            const retryDelayMs = 10000;

            const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            async function findMergedPR() {
              const associated = await github.paginate(
                github.rest.repos.listPullRequestsAssociatedWithCommit,
                {
                  owner,
                  repo,
                  commit_sha: commitSha,
                  per_page: 100,
                },
                (response) => response.data,
              );

              let pr = associated.find((item) => item.merged_at) || associated[0];
              if (pr) {
                return { pr, source: 'commit-association' };
              }

              const recentClosed = await github.paginate(
                github.rest.pulls.list,
                {
                  owner,
                  repo,
                  state: 'closed',
                  base: baseBranch,
                  sort: 'updated',
                  direction: 'desc',
                  per_page: 100,
                },
                (response) => response.data,
              );

              pr = recentClosed.find((item) => item.merged_at && item.merge_commit_sha === commitSha);
              if (pr) {
                return { pr, source: 'recent-closed-prs' };
              }

              return null;
            }

            let match = null;
            for (let attempt = 1; attempt <= attempts; attempt += 1) {
              match = await findMergedPR();
              if (match) {
                core.notice(`Resolved PR #${match.pr.number} via ${match.source} on attempt ${attempt}/${attempts}.`);
                break;
              }

              if (attempt < attempts) {
                core.notice(`No merged PR found for commit ${commitSha} on attempt ${attempt}/${attempts}; retrying in ${retryDelayMs / 1000}s.`);
                await sleep(retryDelayMs);
              }
            }

            if (!match) {
              core.setFailed(`Unable to resolve a merged PR for commit ${commitSha} after ${attempts} attempts.`);
              return;
            }

            const pr = match.pr;
            const labels = (pr.labels || []).map((label) => label.name);
            let level = '';
            if (labels.includes('release/major')) {
              level = 'major';
            } else if (labels.includes('release/minor')) {
              level = 'minor';
            } else if (labels.includes('release/patch')) {
              level = 'patch';
            }

            if (!level) {
              core.setFailed(`PR #${pr.number} is missing a release label.`);
              return;
            }

            core.setOutput('level', level);
            core.setOutput('number', String(pr.number));
            core.setOutput('title', pr.title);

      - name: Compute next semantic version
        id: semver
        shell: bash
        run: |
          latest="$(git tag -l 'v*' --sort=-version:refname | head -n 1)"
          if [ -z "${latest}" ]; then
            latest="v0.0.0"
          fi

          version="${latest#v}"
          IFS='.' read -r major minor patch <<<"${version}"

          case "${{ steps.pr.outputs.level }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
            *)
              echo "Unknown release level: ${{ steps.pr.outputs.level }}" >&2
              exit 1
              ;;
          esac

          next="v${major}.${minor}.${patch}"
          echo "tag=${next}" >> "${GITHUB_OUTPUT}"

      - name: Create and push tag
        shell: bash
        run: |
          tag="${{ steps.semver.outputs.tag }}"
          if git rev-parse "${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists, nothing to do."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github@pb33f.io"
          git tag -a "${tag}" -m "${tag}: PR #${{ steps.pr.outputs.number }} ${{ steps.pr.outputs.title }}"
          git push origin "${tag}"
