version: 2

project_name: printing-press

builds:
  - id: default
    main: .
    binary: pp
    env:
      - CGO_ENABLED=0
      - GOWORK=off
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Tag }} -X main.commit={{ .ShortCommit }} -X main.date={{ .Date }}
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
      - "386"

  - id: darwin
    main: .
    binary: pp
    env:
      - CGO_ENABLED=0
      - GOWORK=off
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Tag }} -X main.commit={{ .ShortCommit }} -X main.date={{ .Date }}
    goos:
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'

homebrew_casks:
  - repository:
      owner: pb33f
      name: homebrew-taps

    commit_author:
      name: pb33f github bot
      email: github@pb33f.io

    homepage: "https://github.com/pb33f/printing-press"
    description: "CLI for the pb33f Printing Press engine"
    binaries:
      - pp

snapshot:
  version_template: "{{ .Version }}-next"
